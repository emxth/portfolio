name: Build and deploy Node.js app to Azure Web App - emithrandiv

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install server dependencies
        working-directory: ./server
        run: npm install

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A1A4E7D8F0D84F80A29555FE5CDBA5FF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6235DCC7D02F44EE9B56E7346498B82C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F326D16F42934459969A00E2B503B466 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "emithrandiv"
          slot-name: "Production"
          package: ./server